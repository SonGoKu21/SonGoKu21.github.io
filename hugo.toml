[params]
  profilePicture = "images/profile.png"
  enableDarkMode = true
  
  [[params.social]]
    name = "orcid"
    url = "https://orcid.org/my-orcid?orcid=0009-0004-0162-5835"
    icon = "fab fa-orcid"
  [[params.social]]
    name = "google-scholar"
    url = "https://scholar.google.com.hk/citations?user=C-F2LFUAAAAJ"
    icon = "fab fa-google-scholar"
  [[params.social]]
    name = "email"
    url = "jinhao@suou.waseda.jp"
    icon = "fas fa-envelope"

[build]
  writeStats = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
